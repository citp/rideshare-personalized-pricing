<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body { font-family: sans-serif; padding: 12px; width: 420px; }
      h3 { margin: 0 0 10px; }
      button { width: 100%; padding: 10px; margin-bottom: 6px; cursor: pointer; font-size: 14px; border: none; border-radius: 4px; }
      #download-btn { background: #2b6cb0; color: white; }
      #download-btn:hover { background: #2c5282; }
      #download-btn:disabled { background: #a0aec0; cursor: default; }
      #status { margin: 10px 0; font-size: 13px; color: #333; white-space: pre-wrap; }
      .trip-table-wrapper { max-height: 320px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 4px; }
      table { width: 100%; border-collapse: collapse; font-size: 11px; }
      th, td { text-align: left; padding: 3px 5px; border-bottom: 1px solid #eee; }
      th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
      .done { color: #276749; }
      .pending { color: #ccc; }
      .active { color: #c53030; font-weight: bold; }
      .skipped { color: #a0aec0; }
      .error { color: #c53030; }
      .current-row { background: #ebf8ff; }
      .login-warning { color: #c53030; font-weight: bold; background: #fff5f5; border: 1px solid #fc8181; padding: 8px; border-radius: 4px; }
      .note { font-size: 11px; color: #666; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h3>Uber Personalized Prices Aggregator</h3>
    <div id="status">Loading…</div>
    <button id="download-btn" disabled>Download CSV</button>
    <div id="trip-list"></div>
    <script src="popup.js"></script>
  </body>
</html>
