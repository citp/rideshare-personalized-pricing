<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verification failed</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f7fafc;
      color: #1a202c;
    }
    .wrap {
      max-width: 620px;
      margin: 48px auto;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 20px 22px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      color: #c53030;
    }
    p {
      margin: 8px 0;
      line-height: 1.45;
    }
    .muted {
      color: #4a5568;
      font-size: 14px;
    }
    #message {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      text-decoration: none;
      background: #2b6cb0;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Verification check failed</h1>
    <p id="message">A verification check failed. Prolific will open in a new tab shortly.</p>
    <p class="muted">If nothing opens, use Continue now.</p>
    <a id="continue" class="btn" href="https://app.prolific.com/submissions/complete?cc=C12ULBAL">Continue now</a>
  </div>
</body>
</html>
