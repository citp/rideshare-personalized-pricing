<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Enter Prolific ID</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f7fafc;
        color: #2d3748;
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 24px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 10px 0;
      }
      p {
        margin: 0 0 16px 0;
        color: #4a5568;
        line-height: 1.5;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 10px;
      }
      button {
        background: #2b6cb0;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .msg {
        margin-top: 10px;
        font-size: 13px;
        color: #2f855a;
      }
      .err {
        color: #c53030;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Prolific ID Required</h1>
      <p>Please enter your Prolific ID to start using the extension. It will be saved in this browser profile.</p>
      <input id="prolific-id" type="text" placeholder="Enter Prolific ID" />
      <button id="save-btn">Save Prolific ID</button>
      <div id="msg" class="msg"></div>
    </div>
    <script src="prolific-id.js"></script>
  </body>
</html>
